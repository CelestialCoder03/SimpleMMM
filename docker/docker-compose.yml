services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: mmm-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mmm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 5s

  # Redis
  redis:
    image: redis:8-alpine
    container_name: mmm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 3
      start_period: 2s

  # Backend API
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mmm-api
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mmm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UPLOAD_DIR: /app/uploads
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      DEBUG: "true"
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/app:/app/app:ro
      - uploads_data:/app/uploads
    restart: unless-stopped

  # Celery Worker
  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    container_name: mmm-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mmm
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UPLOAD_DIR: /app/uploads
      DEBUG: "true"
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping --timeout 5 2>/dev/null | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ../backend/app:/app/app:ro
      - uploads_data:/app/uploads
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mmm-frontend
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mmm-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads_data:
